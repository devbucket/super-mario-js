<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>super-mario-js</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap"
    />
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #000;
      }
      #game-root {
        height: 100%;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        box-sizing: border-box;
      }
      #debug-area-controls {
        position: absolute;
        top: 8px;
        left: 8px;
        z-index: 2;
        display: flex;
        gap: 8px;
        align-items: center;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        color: #cfcfcf;
        background: rgba(0, 0, 0, 0.55);
        padding: 6px 8px;
        border-radius: 4px;
      }
      #debug-area-controls label {
        display: flex;
        gap: 4px;
        align-items: center;
      }
      #debug-area-controls select {
        font: inherit;
        color: #111;
      }
      #game-viewport {
        overflow: hidden;
        line-height: 0;
        flex-shrink: 0;
      }
      #game {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        min-width: 0;
        min-height: 0;
      }
    </style>
  </head>
  <body>
    <div id="game-root">
      <div id="debug-area-controls">
        <label>
          World
          <select id="debug-world"></select>
        </label>
        <label>
          Area
          <select id="debug-area"></select>
        </label>
      </div>
      <div id="game-viewport">
        <canvas id="game" width="256" height="240"></canvas>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
